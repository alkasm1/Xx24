<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ALM v3 Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #fafafa; }
    h1 { margin-bottom: 5px; }
    pre { background: #111; color: #0f0; padding: 10px; height: 200px; overflow-y: scroll; }
    button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    input { padding: 8px; width: 300px; }

    /* 🔥 Terminal Style */
    #terminal {
      background: #000;
      color: #0f0;
      padding: 10px;
      height: 250px;
      overflow-y: auto;
      font-family: monospace;
      border-radius: 6px;
      white-space: pre-wrap;
      margin-top: 20px;
    }

    /* شاشة اختبار الضغط */
    #stressScreen {
      display: none;
      background: #fff;
      padding: 15px;
      border: 1px solid #ccc;
      margin-top: 20px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<!-- 🔥 WebSocket Status -->
<div id="wsStatus" style="
  padding:10px;
  font-size:18px;
  font-weight:bold;
  background:#222;
  color:#fff;
  margin-bottom:15px;
  border-radius:6px;">
  WS: ⏳ connecting...
</div>

<h1>📡 ALM v3 Control Dashboard</h1>

<!-- زر فتح شاشة اختبار الضغط -->
<button id="openStress">🔥 Stress Test</button>

<!-- ========================= -->
<!-- SEND OPCODE -->
<!-- ========================= -->
<h2>📡 Send Opcode</h2>

<div>
  <label>Device ID:</label>
  <input id="opcodeDevice" value="android-1"><br><br>

  <label>Opcode:</label>
  <input id="opcodeInput" value="system.getIdentity"><br><br>

  <button onclick="sendOpcode()">Send Opcode</button>
</div>

<!-- ========================= -->
<!-- RESULT -->
<!-- ========================= -->
<h2>📜 Result</h2>
<pre id="opcodeResult"></pre>

<!-- ========================= -->
<!-- DEVICES -->
<!-- ========================= -->
<h2>📡 Devices (from registry)</h2>
<pre id="devicesBox"></pre>

<!-- ========================= -->
<!-- LOGS -->
<!-- ========================= -->
<h2>📜 Logs</h2>
<pre id="logs"></pre>

<!-- ========================= -->
<!-- 🔥 TERMINAL (LIVE GATEWAY OUTPUT) -->
<!-- ========================= -->
<h2>🖥️ Gateway Terminal (Live)</h2>
<pre id="terminal"></pre>

<!-- ========================= -->
<!-- 🔥 STRESS TEST SCREEN -->
<!-- ========================= -->
<div id="stressScreen">
  <h2>🔥 Stress Test Dashboard</h2>

  <button id="runLight">Light</button>
  <button id="runMedium">Medium</button>
  <button id="runHeavy">Heavy</button>
  <button id="runExtreme">Extreme</button>

  <h3>📊 Results</h3>
  <pre id="stressResults"></pre>
</div>

<h2>📜 المطور: رأفت عمر</h2>

<script>
  const ws = new WebSocket("ws://192.168.88.245:5001");

  const wsStatus = document.getElementById("wsStatus");
  const resultBox = document.getElementById("opcodeResult");
  const devicesBox = document.getElementById("devicesBox");
  const logs = document.getElementById("logs");
  const terminal = document.getElementById("terminal");
  const stressResults = document.getElementById("stressResults");

  // -----------------------------
  // فتح شاشة اختبار الضغط
  // -----------------------------
  document.getElementById("openStress").onclick = () => {
    document.getElementById("stressScreen").style.display = "block";
  };

  // -----------------------------
  // WS Lifecycle
  // -----------------------------
  ws.onopen = () => {
    wsStatus.innerText = "WS: ✅ connected";
    wsStatus.style.background = "#0a0";
  };

  ws.onclose = () => {
    wsStatus.innerText = "WS: ❌ disconnected";
    wsStatus.style.background = "#a00";
  };

  // -----------------------------
  // WS Messages
  // -----------------------------
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    // 🔥 opcode result
    if (msg.type === "opcode.result") {
      resultBox.textContent = JSON.stringify(msg, null, 2);
    }

    // snapshot
    if (msg.type === "snapshot") {
      devicesBox.textContent = JSON.stringify(msg.devices, null, 2);
    }

    // 🔥 TERMINAL OUTPUT
    if (msg.type === "terminal") {
      terminal.textContent += "\n" + msg.line;
      terminal.scrollTop = terminal.scrollHeight;
    }

    // 🔥 STRESS TEST RESULTS
    if (msg.type === "stressUpdate") {
      stressResults.textContent = JSON.stringify(msg.data, null, 2);
    }

    // logs
    logs.textContent += "\n" + event.data;
    logs.scrollTop = logs.scrollHeight;
  };

  // -----------------------------
  // SEND OPCODE
  // -----------------------------
  function sendOpcode() {
    const deviceId = document.getElementById("opcodeDevice").value;
    const opcode = document.getElementById("opcodeInput").value;

    const req = {
      type: "ui.opcode",
      requestId: "req-" + Math.random().toString(36).slice(2),
      deviceId,
      opcode,
      meta: {}
    };

    ws.send(JSON.stringify(req));
    logs.textContent += "\n📤 SENT OPCODE → " + opcode;
  }

  // -----------------------------
  // RUN STRESS TEST
  // -----------------------------
  function runStress(profile) {
    ws.send(JSON.stringify({
      type: "ui.stress.run",
      profile
    }));
    logs.textContent += `\n🔥 STRESS START → ${profile}`;
  }

  document.getElementById("runLight").onclick = () => runStress("light");
  document.getElementById("runMedium").onclick = () => runStress("medium");
  document.getElementById("runHeavy").onclick = () => runStress("heavy");
  document.getElementById("runExtreme").onclick = () => runStress("extreme");

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>ALM v3 Control Plane</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      direction: rtl;
    }

    .header {
      background: #222;
      color: #fff;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      gap: 10px;
      background: #333;
      padding: 10px;
    }

    .tabs button {
      padding: 10px 20px;
      cursor: pointer;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
    }

    .tabs button:hover {
      background: #555;
    }

    .view {
      padding: 20px;
      display: none;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      border-radius: 6px;
      overflow-y: auto;
      max-height: 250px;
    }

    input, button {
      padding: 8px;
      margin: 5px 0;
    }

    #wsStatus {
      padding: 10px;
      font-size: 16px;
      font-weight: bold;
      background: #222;
      color: #fff;
      margin: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="header">لوحة تحكم ALM الإصدار 3</div>

<div id="wsStatus">WS: ⏳ جاري الاتصال...</div>

<div class="tabs">
  <button onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('opcode')">Opcode Console</button>
  <button onclick="showTab('devices')">Devices</button>
  <button onclick="showTab('logs')">Logs</button>
</div>

<!-- Views -->
<div id="view-dashboard" class="view"></div>
<div id="view-opcode" class="view"></div>
<div id="view-devices" class="view"></div>
<div id="view-logs" class="view"></div>

<script src="app.js"></script>

</body>
</html>

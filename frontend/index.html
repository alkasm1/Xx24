<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    ALM v3 Dashboard
  </title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      padding: 20px;

      font-family:
        Arial,
        sans-serif;

      background:
        #f4f6f9;

      color:
        #111;
    }

    h1,
    h2,
    h3 {

      margin-top: 0;
    }

    .header {

      display: flex;

      justify-content:
        space-between;

      align-items: center;

      margin-bottom: 20px;

      gap: 20px;

      flex-wrap: wrap;
    }

    .badge {

      padding:
        10px 16px;

      border-radius: 8px;

      font-size: 16px;

      font-weight: bold;

      color: #fff;

      background: #333;
    }

    .grid {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(420px, 1fr)
        );

      gap: 20px;
    }

    .card {

      background: #fff;

      border-radius: 16px;

      padding: 20px;

      box-shadow:
        0 4px 18px
        rgba(0,0,0,0.08);
    }

    .row {

      margin-bottom: 14px;
    }

    label {

      display: block;

      margin-bottom: 6px;

      font-weight: bold;
    }

    input {

      width: 100%;

      padding: 12px;

      border-radius: 8px;

      border:
        1px solid #d1d5db;

      font-size: 14px;

      outline: none;
    }

    input:focus {

      border-color: #2563eb;
    }

    button {

      border: none;

      border-radius: 8px;

      padding:
        10px 16px;

      cursor: pointer;

      font-weight: bold;

      transition:
        0.2s;
    }

    button:hover {

      opacity: 0.92;

      transform:
        translateY(-1px);
    }

    .btn-primary {

      background: #2563eb;

      color: #fff;
    }

    .btn-light {

      background: #16a34a;

      color: #fff;
    }

    .btn-medium {

      background: #ca8a04;

      color: #fff;
    }

    .btn-heavy {

      background: #ea580c;

      color: #fff;
    }

    .btn-extreme {

      background: #991b1b;

      color: #fff;
    }

    .stress-buttons {

      display: flex;

      flex-wrap: wrap;

      gap: 10px;

      margin-bottom: 14px;
    }

    .footer {

      margin-top: 10px;

      opacity: 0.7;

      font-size: 13px;
    }

    /* -----------------------------
       DEVICE CARDS
    ----------------------------- */

    .device-card {

      background: #0b1220;

      color: #d1fae5;

      border:
        1px solid #1f2937;

      border-radius: 14px;

      padding: 14px;

      margin-bottom: 14px;
    }

    .device-header {

      display: flex;

      justify-content:
        space-between;

      margin-bottom: 10px;

      color: #fff;
    }

    .device-meta {

      font-size: 13px;

      color: #9ca3af;

      margin-bottom: 12px;

      line-height: 1.7;
    }

    .device-actions {

      display: flex;

      flex-wrap: wrap;

      gap: 8px;
    }

    .device-action-btn {

      background: #2563eb;

      color: white;

      border: none;

      border-radius: 6px;

      padding:
        8px 12px;

      cursor: pointer;

      font-size: 12px;
    }

    .device-action-btn:hover {

      opacity: 0.9;
    }

    /* -----------------------------
       TERMINAL STYLE
    ----------------------------- */

    .runtime-terminal {

      background: #0b1220;

      color: #d1fae5;

      border-radius: 14px;

      padding: 16px;

      font-family: monospace;

      font-size: 13px;

      line-height: 1.7;

      overflow-x: auto;

      overflow-y: auto;

      white-space: pre-wrap;

      direction: ltr;

      unicode-bidi: plaintext;

      text-align: left;

      border:
        1px solid #1f2937;

      min-height: 220px;

      max-height: 320px;
    }

    .runtime-terminal .line {

      margin-bottom: 8px;
    }

    #devicesBox {

      background: #0b1220;

      color: #d1fae5;
    }

    #logs {

      background: #020617;

      color: #22c55e;
    }

    #stressResults {

      background: #111827;

      color: #f8fafc;
    }

    #opcodeResult {

      background: #111827;

      color: #f8fafc;
    }

    #terminalOutput {

      background: #020617;

      color: #22c55e;
    }

    @media (
      max-width: 768px
    ) {

      body {

        padding: 12px;
      }

      .grid {

        grid-template-columns:
          1fr;
      }
    }

  </style>

</head>

<body>

  <!-- HEADER -->
  <div class="header">

    <div>

      <h1>
        📡 ALM v3 Control Dashboard
      </h1>

      <div class="footer">
        Runtime • Sessions • Tasks • Stress • Live Transport
      </div>

    </div>

    <div
      id="wsStatus"
      class="badge"
    >
      WS: ⏳ connecting...
    </div>

  </div>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- OPCODE PANEL -->
    <div class="card">

      <h2>
        ⚡ Opcode Execution
      </h2>

      <div class="row">

        <label>
          Device ID
        </label>

        <input
          id="opcodeDevice"
          value="router-1"
        />

      </div>

      <div class="row">

        <label>
          Opcode
        </label>

        <input
          id="opcodeInput"
          value="system.getIdentity"
        />

      </div>

      <button
        class="btn-primary"
        onclick="sendOpcode()"
      >
        🚀 Execute Opcode
      </button>

    </div>

    <!-- TERMINAL PANEL -->
    <div class="card">

      <h2>
        🖥 Interactive Terminal
      </h2>

      <div class="row">

        <label>
          Command
        </label>

        <input
          id="terminalInput"
          value="uname -a"
        />

      </div>

      <button
        class="btn-primary"
        onclick="runTerminal()"
      >
        ▶ Execute Command
      </button>

      <div
        id="terminalOutput"
        class="runtime-terminal"
        style="margin-top:14px;"
      ></div>

    </div>

    <!-- STRESS PANEL -->
    <div class="card">

      <h2>
        🔥 Stress Testing
      </h2>

      <div class="stress-buttons">

        <button
          id="runLight"
          class="btn-light"
        >
          Light
        </button>

        <button
          id="runMedium"
          class="btn-medium"
        >
          Medium
        </button>

        <button
          id="runHeavy"
          class="btn-heavy"
        >
          Heavy
        </button>

        <button
          id="runExtreme"
          class="btn-extreme"
        >
          Extreme
        </button>

      </div>

      <div
        id="stressResults"
        class="runtime-terminal"
      ></div>

    </div>

    <!-- OPCODE RESULT -->
    <div class="card">

      <h2>
        📜 Opcode Result
      </h2>

      <div
        id="opcodeResult"
        class="runtime-terminal"
      ></div>

    </div>

    <!-- DEVICES -->
    <div class="card">

      <h2>
        🖧 Runtime Devices
      </h2>

      <div
        id="devicesBox"
        class="runtime-terminal"
      ></div>

    </div>

    <!-- LOGS -->
    <div
      class="card"
      style="
        grid-column:
        1 / -1;
      "
    >

      <h2>
        📡 Runtime Logs
      </h2>

      <div
        id="logs"
        class="runtime-terminal"
      ></div>

    </div>

  </div>

  <script
    type="module"
    src="app.js"
  ></script>

</body>

</html>

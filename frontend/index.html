<!DOCTYPE html>
<html lang="ar">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ALM v3 Dashboard</title>

  <style>

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #111;
      direction: rtl;
      text-align: right;
    }

    h1, h2 { margin-top: 0; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .badge {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .row { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      font-size: 14px;
    }

    button:hover { opacity: 0.9; }

    .btn-primary { background: #2563eb; color: #fff; }

    .btn-light { background: #16a34a; color: #fff; }
    .btn-medium { background: #ca8a04; color: #fff; }
    .btn-heavy { background: #ea580c; color: #fff; }
    .btn-extreme { background: #991b1b; color: #fff; }

    pre {
      margin: 0;
      padding: 14px;
      border-radius: 8px;
      background: #111;
      color: #0f0;
      overflow-x: auto;
      overflow-y: auto;
      min-height: 220px;
      max-height: 320px;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .stress-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

  </style>

</head>

<body>

  <div class="header">
    <div>
      <h1>📡 لوحة تحكم ALM v3</h1>
      <div style="opacity:0.7; font-size:13px;">Runtime • Sessions • Tasks • Stress • Live Transport</div>
    </div>
    <div id="wsStatus" class="badge">WS: ⏳ جاري الاتصال...</div>
  </div>

  <!-- الأزرار خارج بطاقة الأجهزة -->
  <div style="margin-bottom: 20px; display:flex; gap:10px; flex-wrap:wrap;">
    <button class="btn-primary" onclick="sendOpcode()">system.getIdentity</button>
    <button class="btn-primary" onclick="rebootDevice()">إعادة تشغيل النظام</button>
  </div>

  <div class="grid">

    <div class="card">
      <h2>⚡ تنفيذ Opcode</h2>

      <div class="row">
        <label>معرّف الجهاز</label>
        <input id="opcodeDevice" value="router-1" />
      </div>

      <div class="row">
        <label>Opcode</label>
        <input id="opcodeInput" value="system.getIdentity" />
      </div>

      <button class="btn-primary" onclick="sendOpcode()">🚀 تنفيذ</button>
    </div>

    <div class="card">
      <h2>🔥 اختبار الضغط</h2>

      <div class="stress-buttons">
        <button id="runLight" class="btn-light">خفيف</button>
        <button id="runMedium" class="btn-medium">متوسط</button>
        <button id="runHeavy" class="btn-heavy">ثقيل</button>
        <button id="runExtreme" class="btn-extreme">عنيف</button>
      </div>

      <pre id="stressResults"></pre>
    </div>

    <div class="card">
      <h2>📜 نتيجة Opcode</h2>
      <pre id="opcodeResult"></pre>
    </div>

    <div class="card">
      <h2>🖧 أجهزة وقت التشغيل</h2>
      <pre id="devicesBox"></pre>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h2>📡 سجلات وقت التشغيل</h2>
      <pre id="logs"></pre>
    </div>

  </div>

  <script type="module" src="app.js"></script>

</body>

</html>

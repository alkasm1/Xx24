<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    ALM v3 Dashboard
  </title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {

      --bg:
        #eef2f7;

      --panel:
        #ffffff;

      --border:
        #d7dee7;

      --text:
        #111827;

      --muted:
        #6b7280;

      --primary:
        #2563eb;

      --success:
        #16a34a;

      --warning:
        #ca8a04;

      --danger:
        #ea580c;

      --extreme:
        #991b1b;

      --terminal:
        #0b1220;

      --terminalText:
        #22c55e;
    }

    body {

      font-family:
        Arial,
        sans-serif;

      background:
        var(--bg);

      color:
        var(--text);

      min-height:
        100vh;

      display:
        flex;
    }

    /* SIDEBAR */

    .sidebar {

      width:
        240px;

      background:
        linear-gradient(
          180deg,
          #a8b0ba,
          #9099a5
        );

      padding:
        14px;

      border-left:
        1px solid
        rgba(0,0,0,.15);

      overflow-y:
        auto;
    }

    .sidebar h2 {

      font-size:
        16px;

      margin-bottom:
        14px;

      color:
        white;

      text-align:
        center;
    }

    .side-btn {

      width:
        100%;

      border:
        none;

      border-radius:
        10px;

      background:
        rgba(255,255,255,.18);

      padding:
        12px;

      margin-bottom:
        8px;

      cursor:
        pointer;

      font-weight:
        bold;

      color:
        #1f2937;

      transition:
        .2s;

      text-align:
        right;
    }

    .side-btn:hover {

      background:
        rgba(255,255,255,.35);
    }

    /* MAIN */

    .main {

      flex:
        1;

      display:
        flex;

      flex-direction:
        column;
    }

    .topbar {

      background:
        #fff;

      border-bottom:
        1px solid
        var(--border);

      padding:
        16px 20px;

      display:
        flex;

      justify-content:
        space-between;

      align-items:
        center;
    }

    .topbar h1 {

      font-size:
        22px;
    }

    .subtitle {

      font-size:
        13px;

      color:
        var(--muted);

      margin-top:
        4px;
    }

    .ws-badge {

      background:
        #111827;

      color:
        white;

      padding:
        10px 14px;

      border-radius:
        10px;

      font-size:
        14px;

      font-weight:
        bold;
    }

    /* CONTENT */

    .content {

      padding:
        16px;

      display:
        flex;

      flex-direction:
        column;

      gap:
        16px;
    }

    .window {

      background:
        var(--panel);

      border:
        1px solid
        var(--border);

      border-radius:
        14px;

      overflow:
        hidden;

      box-shadow:
        0 3px 10px
        rgba(0,0,0,.05);
    }

    .window-header {

      padding:
        14px 18px;

      background:
        linear-gradient(
          180deg,
          #eef1f5,
          #dfe5ec
        );

      border-bottom:
        1px solid
        var(--border);

      font-weight:
        bold;

      font-size:
        15px;
    }

    .window-body {

      padding:
        18px;
    }

    .row {

      margin-bottom:
        14px;
    }

    label {

      display:
        block;

      margin-bottom:
        6px;

      font-size:
        13px;

      font-weight:
        bold;
    }

    input {

      width:
        100%;

      padding:
        11px;

      border-radius:
        8px;

      border:
        1px solid
        #cbd5e1;

      font-size:
        14px;
    }

    button {

      border:
        none;

      border-radius:
        8px;

      padding:
        10px 16px;

      cursor:
        pointer;

      font-weight:
        bold;

      transition:
        .2s;
    }

    button:hover {

      opacity:
        .92;
    }

    .btn-primary {

      background:
        var(--primary);

      color:
        white;
    }

    .btn-light {

      background:
        var(--success);

      color:
        white;
    }

    .btn-medium {

      background:
        var(--warning);

      color:
        white;
    }

    .btn-heavy {

      background:
        var(--danger);

      color:
        white;
    }

    .btn-extreme {

      background:
        var(--extreme);

      color:
        white;
    }

    .stress-buttons {

      display:
        flex;

      flex-wrap:
        wrap;

      gap:
        10px;

      margin-bottom:
        12px;
    }

    /* TERMINAL */

    .runtime-terminal {

      background:
        var(--terminal);

      color:
        var(--terminalText);

      border:
        1px solid
        #1f2937;

      border-radius:
        10px;

      padding:
        14px;

      font-family:
        monospace;

      font-size:
        13px;

      line-height:
        1.5;

      white-space:
        pre-wrap;

      overflow:
        auto;

      min-height:
        180px;

      max-height:
        320px;
    }

    /* DEVICE LIST */

    .device-list {

      display:
        flex;

      flex-direction:
        column;

      gap:
        10px;
    }

    .device-item {

      background:
        #111827;

      border:
        1px solid
        #1f2937;

      border-radius:
        10px;

      padding:
        14px;

      color:
        #e5e7eb;
    }

    .device-title {

      font-size:
        15px;

      font-weight:
        bold;

      margin-bottom:
        10px;

      color:
        #22c55e;
    }

    .device-grid {

      display:
        grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(180px,1fr)
        );

      gap:
        8px;
    }

    .device-field {

      background:
        rgba(255,255,255,.04);

      border-radius:
        8px;

      padding:
        8px 10px;

      line-height:
        1.4;
    }

    .device-label {

      color:
        #9ca3af;

      font-size:
        11px;

      margin-bottom:
        4px;
    }

    .device-value {

      color:
        #f9fafb;

      font-size:
        13px;

      word-break:
        break-word;
    }

    @media (
      max-width: 768px
    ) {

      body {

        flex-direction:
          column;
      }

      .sidebar {

        width:
          100%;

        display:
          flex;

        gap:
          8px;

        overflow-x:
          auto;
      }

      .side-btn {

        min-width:
          120px;

        margin:
          0;
      }
    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <h2>
      📋 القائمة
    </h2>

    <button class="side-btn">
      ⚡ Opcode
    </button>

    <button class="side-btn">
      🖥 Terminal
    </button>

    <button class="side-btn">
      🔥 Stress
    </button>

    <button class="side-btn">
      🖧 Devices
    </button>

    <button class="side-btn">
      📡 Logs
    </button>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div class="topbar">

      <div>

        <h1>
          📡 ALM v3 Dashboard
        </h1>

        <div class="subtitle">
          Runtime • Sessions • Tasks • Stress • Live Transport
        </div>

      </div>

      <div
        id="wsStatus"
        class="ws-badge"
      >
        WS: Connecting...
      </div>

    </div>

    <div class="content">

      <!-- OPCODE -->

      <div class="window">

        <div class="window-header">
          ⚡ Opcode Execution
        </div>

        <div class="window-body">

          <div class="row">

            <label>
              Device ID
            </label>

            <input
              id="opcodeDevice"
              value="router-1"
            />

          </div>

          <div class="row">

            <label>
              Opcode
            </label>

            <input
              id="opcodeInput"
              value="system.getIdentity"
            />

          </div>

          <button
            class="btn-primary"
            onclick="sendOpcode()"
          >
            🚀 Execute
          </button>

        </div>

      </div>

      <!-- TERMINAL -->

      <div class="window">

        <div class="window-header">
          🖥 Interactive Terminal
        </div>

        <div class="window-body">

          <div class="row">

            <label>
              Command
            </label>

            <input
              id="terminalInput"
              value="uname -a"
            />

          </div>

          <button
            class="btn-primary"
            onclick="runTerminal()"
          >
            ▶ Execute Command
          </button>

          <div
            id="terminalOutput"
            class="runtime-terminal"
            style="margin-top:14px;"
          ></div>

        </div>

      </div>

      <!-- STRESS -->

      <div class="window">

        <div class="window-header">
          🔥 Stress Testing
        </div>

        <div class="window-body">

          <div class="stress-buttons">

            <button
              id="runLight"
              class="btn-light"
            >
              Light
            </button>

            <button
              id="runMedium"
              class="btn-medium"
            >
              Medium
            </button>

            <button
              id="runHeavy"
              class="btn-heavy"
            >
              Heavy
            </button>

            <button
              id="runExtreme"
              class="btn-extreme"
            >
              Extreme
            </button>

          </div>

          <div
            id="stressResults"
            class="runtime-terminal"
          ></div>

        </div>

      </div>

      <!-- DEVICES -->

      <div class="window">

        <div class="window-header">
          🖧 Runtime Devices
        </div>

        <div class="window-body">

          <div id="devicesBox">

            <div class="device-list">

              <div class="device-item">

                <div class="device-title">
                  router-1
                </div>

                <div class="device-grid">

                  <div class="device-field">

                    <div class="device-label">
                      IP
                    </div>

                    <div class="device-value">
                      192.168.88.1
                    </div>

                  </div>

                  <div class="device-field">

                    <div class="device-label">
                      Method
                    </div>

                    <div class="device-value">
                      SSH
                    </div>

                  </div>

                  <div class="device-field">

                    <div class="device-label">
                      Profile
                    </div>

                    <div class="device-value">
                      Linux
                    </div>

                  </div>

                  <div class="device-field">

                    <div class="device-label">
                      Status
                    </div>

                    <div class="device-value">
                      Online
                    </div>

                  </div>

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

      <!-- LOGS -->

      <div class="window">

        <div class="window-header">
          📡 Runtime Logs
        </div>

        <div class="window-body">

          <div
            id="logs"
            class="runtime-terminal"
          ></div>

        </div>

      </div>

    </div>

  </div>

  <script
    type="module"
    src="app.js"
  ></script>

</body>

</html>

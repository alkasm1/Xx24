<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ALM v3 Dashboard</title>

  <style>

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #111827;
      border-right: 1px solid #1f2937;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #f8fafc;
    }

    .side-btn {
      background: #1e293b;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      cursor: pointer;
      text-align: right;
      font-size: 14px;
      transition: 0.2s;
    }

    .side-btn:hover {
      background: #334155;
    }

    /* MAIN AREA */
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .badge {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      color: #fff;
      background: #1e293b;
      border: 1px solid #334155;
    }

    /* CARDS (unchanged from your code) */
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 0 18px rgba(0,0,0,0.25);
      margin-bottom: 20px;
    }

    .row { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
    }

    input:focus { border-color: #2563eb; }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-primary { background: #2563eb; color: white; }
    .btn-light { background: #16a34a; color: white; }
    .btn-medium { background: #ca8a04; color: white; }
    .btn-heavy { background: #ea580c; color: white; }
    .btn-extreme { background: #991b1b; color: white; }

    .stress-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .runtime-terminal {
      background: #020617;
      color: #22c55e;
      border-radius: 12px;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      overflow-y: auto;
      white-space: pre-wrap;
      border: 1px solid #1e293b;
      min-height: 220px;
      max-height: 320px;
    }

    /* Hide all pages initially */
    .page { display: none; }

    /* Show active page */
    .active { display: block; }

  </style>

</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>القائمة</h2>

    <button class="side-btn" onclick="showPage('pageOpcode')">⚡ تنفيذ Opcode</button>
    <button class="side-btn" onclick="showPage('pageTerminal')">🖥 الطرفية</button>
    <button class="side-btn" onclick="showPage('pageStress')">🔥 اختبار الضغط</button>
    <button class="side-btn" onclick="showPage('pageDevices')">🖧 الأجهزة</button>
    <button class="side-btn" onclick="showPage('pageLogs')">📡 السجلات</button>
  </div>

  <!-- MAIN AREA -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <div>
        <h1>📡 ALM v3 Control Dashboard</h1>
        <div style="opacity:0.7; font-size:13px;">Runtime • Sessions • Tasks • Stress • Live Transport</div>
      </div>

      <div id="wsStatus" class="badge">WS: ⏳ Connecting...</div>
    </div>

    <!-- PAGES -->

    <!-- OPCODE PAGE -->
    <div id="pageOpcode" class="page active">
      <div class="card">
        <h2>⚡ Opcode Execution</h2>

        <div class="row">
          <label>Device ID</label>
          <input id="opcodeDevice" value="router-1" />
        </div>

        <div class="row">
          <label>Opcode</label>
          <input id="opcodeInput" value="system.getIdentity" />
        </div>

        <button class="btn-primary" onclick="sendOpcode()">🚀 Execute Opcode</button>

        <div id="opcodeResult" class="runtime-terminal" style="margin-top:14px;"></div>
      </div>
    </div>

    <!-- TERMINAL PAGE -->
    <div id="pageTerminal" class="page">
      <div class="card">
        <h2>🖥 Interactive Terminal</h2>

        <div class="row">
          <label>Command</label>
          <input id="terminalInput" value="uname -a" />
        </div>

        <button class="btn-primary" onclick="runTerminal()">▶ Execute Command</button>

        <div id="terminalOutput" class="runtime-terminal" style="margin-top:14px;"></div>
      </div>
    </div>

    <!-- STRESS PAGE -->
    <div id="pageStress" class="page">
      <div class="card">
        <h2>🔥 Stress Testing</h2>

        <div class="stress-buttons">
          <button id="runLight" class="btn-light">Light</button>
          <button id="runMedium" class="btn-medium">Medium</button>
          <button id="runHeavy" class="btn-heavy">Heavy</button>
          <button id="runExtreme" class="btn-extreme">Extreme</button>
        </div>

        <div id="stressResults" class="runtime-terminal"></div>
      </div>
    </div>

    <!-- DEVICES PAGE -->
    <div id="pageDevices" class="page">
      <div class="card">
        <h2>🖧 Runtime Devices</h2>
        <div id="devicesBox" class="runtime-terminal"></div>
      </div>
    </div>

    <!-- LOGS PAGE -->
    <div id="pageLogs" class="page">
      <div class="card">
        <h2>📡 Runtime Logs</h2>
        <div id="logs" class="runtime-terminal"></div>
      </div>
    </div>

  </div>

  <script type="module" src="app.js"></script>

  <script>
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
  </script>

</body>

</html>

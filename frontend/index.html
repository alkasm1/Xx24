<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  />

  <title>
    ALM v3 Dashboard
  </title>

  <link
    rel="stylesheet"
    href="./styles/main.css"
  />

</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      📡 ALM v3
    </div>

    <button
      class="side-btn active"
      data-window="opcodeWindow"
    >
      ⚡ Opcode
    </button>

    <button
      class="side-btn"
      data-window="terminalWindow"
    >
      🖥 Terminal
    </button>

    <button
      class="side-btn"
      data-window="stressWindow"
    >
      🔥 Stress
    </button>

    <button
      class="side-btn"
      data-window="devicesWindow"
    >
      🖧 Devices
    </button>

    <button
      class="side-btn"
      data-window="logsWindow"
    >
      📋 Logs
    </button>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">

      <div>

        <h1>
          ALM Runtime Dashboard
        </h1>

        <div class="sub">
          Gateway • Runtime • Sessions • Tasks
        </div>

      </div>

      <div
        id="wsStatus"
        class="ws-status offline"
      >
        WS: Offline
      </div>

    </header>

    <!-- CONTENT -->
    <section class="content">

      <!-- OPCODE -->
      <div
        class="window"
        id="opcodeWindow"
      >

        <div class="window-header">
          ⚡ Opcode Execution
        </div>

        <div class="window-body">

          <label>
            Device ID
          </label>

          <input
            id="opcodeDevice"
            value="router-1"
          />

          <label>
            Opcode
          </label>

          <input
            id="opcodeInput"
            value="system.getIdentity"
          />

          <button id="runOpcodeBtn">
            Execute
          </button>

          <div
            id="opcodeResult"
            class="terminal"
          ></div>

        </div>

      </div>

      <!-- TERMINAL -->
      <div
        class="window"
        id="terminalWindow"
      >

        <div class="window-header">
          🖥 Interactive Terminal
        </div>

        <div class="window-body">

          <label>
            Command
          </label>

          <input
            id="terminalInput"
            value="uname -a"
          />

          <button id="runTerminalBtn">
            Execute
          </button>

          <div
            id="terminalOutput"
            class="terminal"
          ></div>

        </div>

      </div>

      <!-- STRESS -->
      <div
        class="window"
        id="stressWindow"
      >

        <div class="window-header">
          🔥 Stress Runtime
        </div>

        <div class="window-body">

          <div class="stress-buttons">

            <button
              class="stress-btn"
              data-level="light"
            >
              Light
            </button>

            <button
              class="stress-btn"
              data-level="medium"
            >
              Medium
            </button>

            <button
              class="stress-btn"
              data-level="heavy"
            >
              Heavy
            </button>

            <button
              class="stress-btn"
              data-level="extreme"
            >
              Extreme
            </button>

          </div>

          <div
            id="stressOutput"
            class="terminal"
          ></div>

        </div>

      </div>

      <!-- DEVICES -->
      <div
        class="window"
        id="devicesWindow"
      >

        <div class="window-header">
          🖧 Runtime Devices
        </div>

        <div
          id="devicesOutput"
          class="terminal"
        ></div>

      </div>

      <!-- LOGS -->
      <div
        class="window"
        id="logsWindow"
      >

        <div class="window-header">
          📋 Runtime Logs
        </div>

        <div
          id="logsOutput"
          class="terminal"
        ></div>

      </div>

    </section>

  </main>

  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>

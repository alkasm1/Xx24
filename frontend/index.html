<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no
    "
  />

  <title>
    ALM v3 Dashboard
  </title>

  <style>

    * {

      box-sizing: border-box;

      margin: 0;

      padding: 0;

      -webkit-tap-highlight-color:
        transparent;
    }

    :root {

      --sidebar-bg:
        #9ca3af;

      --sidebar-bg-dark:
        #8b95a1;

      --main-bg:
        #e8ecf0;

      --panel-bg:
        #f4f6f8;

      --panel-border:
        #cfd6dd;

      --panel-border-dark:
        #b7c0c9;

      --text:
        #111827;

      --text-muted:
        #4b5563;

      --accent:
        #2563eb;

      --success:
        #16a34a;

      --warning:
        #ca8a04;

      --danger:
        #ea580c;

      --extreme:
        #991b1b;

      --terminal-bg:
        #0b1220;

      --terminal-text:
        #22c55e;

      --terminal-border:
        #1e293b;
    }

    body {

      font-family:
        Arial,
        sans-serif;

      background:
        var(--main-bg);

      color:
        var(--text);

      display: flex;

      min-height: 100vh;
    }

    /* SIDEBAR */

    .sidebar {

      width: 230px;

      background:
        linear-gradient(
          180deg,
          var(--sidebar-bg),
          var(--sidebar-bg-dark)
        );

      padding: 14px;

      display: flex;

      flex-direction: column;

      gap: 8px;

      border-left:
        1px solid rgba(0,0,0,.15);
    }

    .sidebar-header {

      background:
        rgba(255,255,255,.15);

      border-radius: 10px;

      padding: 12px;

      text-align: center;

      font-weight: bold;

      color: #fff;

      margin-bottom: 10px;
    }

    .side-btn {

      border: none;

      border-radius: 8px;

      padding: 12px;

      text-align: right;

      cursor: pointer;

      font-weight: bold;

      background:
        rgba(255,255,255,.12);

      color:
        #1f2937;

      transition: .2s;
    }

    .side-btn:hover {

      background:
        rgba(255,255,255,.25);
    }

    .side-btn.active {

      background:
        rgba(255,255,255,.4);

      outline:
        2px solid rgba(37,99,235,.3);
    }

    /* MAIN */

    .main {

      flex: 1;

      display: flex;

      flex-direction: column;
    }

    /* TOPBAR */

    .topbar {

      background:
        linear-gradient(
          180deg,
          #f7f9fb,
          #eef2f6
        );

      border-bottom:
        1px solid var(--panel-border);

      padding: 14px 18px;

      display: flex;

      justify-content:
        space-between;

      align-items: center;
    }

    .topbar h1 {

      font-size: 18px;

      margin-bottom: 4px;
    }

    .topbar-sub {

      font-size: 12px;

      color:
        var(--text-muted);
    }

    .ws-status {

      padding:
        8px 14px;

      border-radius: 8px;

      color: white;

      font-weight: bold;

      font-size: 13px;
    }

    .ws-online {

      background:
        var(--success);
    }

    .ws-offline {

      background:
        var(--extreme);
    }

    /* CONTENT */

    .dashboard {

      padding: 16px;

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(420px, 1fr)
        );

      gap: 16px;
    }

    /* WINDOW */

    .window {

      background:
        var(--panel-bg);

      border:
        1px solid var(--panel-border);

      border-radius: 12px;

      overflow: hidden;

      box-shadow:
        0 2px 8px
        rgba(0,0,0,.05);
    }

    .window-header {

      padding:
        12px 14px;

      background:
        linear-gradient(
          180deg,
          #e5e7eb,
          #d1d5db
        );

      border-bottom:
        1px solid var(--panel-border-dark);

      font-weight: bold;
    }

    .window-body {

      padding: 14px;
    }

    /* FORM */

    label {

      display: block;

      margin-bottom: 6px;

      font-weight: bold;

      font-size: 13px;
    }

    input {

      width: 100%;

      padding: 10px;

      border-radius: 8px;

      border:
        1px solid var(--panel-border-dark);

      margin-bottom: 12px;

      font-size: 14px;
    }

    input:focus {

      outline: none;

      border-color:
        var(--accent);
    }

    button {

      border: none;

      border-radius: 8px;

      padding:
        10px 14px;

      cursor: pointer;

      font-weight: bold;

      transition: .2s;
    }

    button:hover {

      opacity: .92;
    }

    .btn-primary {

      background:
        var(--accent);

      color: white;
    }

    .btn-light {

      background:
        var(--success);

      color: white;
    }

    .btn-medium {

      background:
        var(--warning);

      color: white;
    }

    .btn-heavy {

      background:
        var(--danger);

      color: white;
    }

    .btn-extreme {

      background:
        var(--extreme);

      color: white;
    }

    .stress-buttons {

      display: flex;

      flex-wrap: wrap;

      gap: 10px;

      margin-bottom: 12px;
    }

    /* TERMINAL */

    .runtime-terminal {

      background:
        var(--terminal-bg);

      color:
        var(--terminal-text);

      border:
        1px solid var(--terminal-border);

      border-radius: 10px;

      padding: 14px;

      min-height: 220px;

      max-height: 320px;

      overflow: auto;

      font-family:
        monospace;

      font-size: 13px;

      line-height: 1.6;

      white-space: pre-wrap;
    }

    /* MOBILE */

    @media (
      max-width: 768px
    ) {

      body {

        flex-direction: column;
      }

      .sidebar {

        width: 100%;

        flex-direction: row;

        overflow-x: auto;
      }

      .dashboard {

        grid-template-columns:
          1fr;
      }
    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      📡 ALM v3
    </div>

    <button
      class="side-btn active"
    >
      ⚡ Opcode
    </button>

    <button
      class="side-btn"
    >
      🖥 Terminal
    </button>

    <button
      class="side-btn"
    >
      🔥 Stress
    </button>

    <button
      class="side-btn"
    >
      🖧 Devices
    </button>

    <button
      class="side-btn"
    >
      📋 Logs
    </button>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">

      <div>

        <h1>
          📡 ALM v3 Dashboard
        </h1>

        <div class="topbar-sub">
          Runtime • Sessions • Tasks • Gateway
        </div>

      </div>

      <div
        id="wsStatus"
        class="
          ws-status
          ws-offline
        "
      >
        WS: Connecting...
      </div>

    </header>

    <!-- DASHBOARD -->
    <section class="dashboard">

      <!-- OPCODE -->
      <div class="window">

        <div class="window-header">
          ⚡ Opcode Execution
        </div>

        <div class="window-body">

          <label>
            Device ID
          </label>

          <input
            id="opcodeDevice"
            value="router-1"
          />

          <label>
            Opcode
          </label>

          <input
            id="opcodeInput"
            value="system.getIdentity"
          />

          <button
            id="runOpcodeBtn"
            class="btn-primary"
          >
            Execute Opcode
          </button>

          <div
            id="opcodeResult"
            class="runtime-terminal"
            style="
              margin-top:14px;
            "
          ></div>

        </div>

      </div>

      <!-- TERMINAL -->
      <div class="window">

        <div class="window-header">
          🖥 Interactive Terminal
        </div>

        <div class="window-body">

          <label>
            Command
          </label>

          <input
            id="terminalInput"
            value="uname -a"
          />

          <button
            id="runTerminalBtn"
            class="btn-primary"
          >
            Execute Command
          </button>

          <div
            id="terminalOutput"
            class="runtime-terminal"
            style="
              margin-top:14px;
            "
          ></div>

        </div>

      </div>

      <!-- STRESS -->
      <div class="window">

        <div class="window-header">
          🔥 Stress Runtime
        </div>

        <div class="window-body">

          <div class="stress-buttons">

            <button
              id="runLight"
              class="btn-light"
            >
              Light
            </button>

            <button
              id="runMedium"
              class="btn-medium"
            >
              Medium
            </button>

            <button
              id="runHeavy"
              class="btn-heavy"
            >
              Heavy
            </button>

            <button
              id="runExtreme"
              class="btn-extreme"
            >
              Extreme
            </button>

          </div>

          <div
            id="stressResults"
            class="runtime-terminal"
          ></div>

        </div>

      </div>

      <!-- DEVICES -->
      <div class="window">

        <div class="window-header">
          🖧 Runtime Devices
        </div>

        <div
          id="devicesBox"
          class="runtime-terminal"
        ></div>

      </div>

      <!-- LOGS -->
      <div class="window">

        <div class="window-header">
          📋 Runtime Logs
        </div>

        <div
          id="logs"
          class="runtime-terminal"
        ></div>

      </div>

    </section>

  </main>

  <script
    type="module"
    src="app.js"
  ></script>

</body>

</html>
